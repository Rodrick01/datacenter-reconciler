name: datacenter-fabric

topology:
  kinds:
    srl:
      image: ghcr.io/nokia/srlinux
      type: ixr6
  nodes:
    spine1:
      kind: srl
    spine2:
      kind: srl
    leaf1:
      kind: srl
    leaf2:
      kind: srl
  links:
    # Topología Clos / Spine-Leaf estricta
    # Los spines se conectan a todos los leafs, pero no entre sí.
    - endpoints: ["spine1:e1-1", "leaf1:e1-1"]
    - endpoints: ["spine1:e1-2", "leaf2:e1-1"]
    - endpoints: ["spine2:e1-1", "leaf1:e1-2"]
    - endpoints: ["spine2:e1-2", "leaf2:e1-2"]
