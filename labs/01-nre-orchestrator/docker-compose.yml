version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=netbox
      - POSTGRES_USER=netbox
      - POSTGRES_PASSWORD=netbox_password
    volumes:
      - netbox-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  netbox:
    image: netboxcommunity/netbox:v3.7
    depends_on:
      - postgres
      - redis
      - redis-cache
    environment:
      - DB_HOST=postgres
      - DB_NAME=netbox
      - DB_USER=netbox
      - DB_PASSWORD=netbox_password
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - REDIS_CACHE_HOST=redis-cache
      - REDIS_CACHE_PASSWORD=
      - SECRET_KEY=supersecretkeyreconciler12345
      - ALLOWED_HOSTS=*
      - SUPERUSER_NAME=admin
      - SUPERUSER_EMAIL=admin@reconciler.local
      - SUPERUSER_PASSWORD=admin
    ports:
      - "8000:8080"
    restart: unless-stopped

  aico:
    image: nre-agents:latest
    command: ["./aico-agent"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-""}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-""}
    depends_on:
      - netbox
    restart: unless-stopped
    # Para poder acceder a las IPs de Containerlab, a menudo se usa:
    network_mode: "host"

  reconciler:
    image: nre-agents:latest
    command: ["./reconciler-agent"]
    environment:
      - NETBOX_URL=http://localhost:8000
      - NETBOX_TOKEN=supersecretkeyreconciler12345
    depends_on:
      - netbox
    restart: unless-stopped
    network_mode: "host"

volumes:
  netbox-postgres-data:
